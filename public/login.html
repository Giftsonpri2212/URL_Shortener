<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Shortenly</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 8% 10%, rgba(34, 211, 238, 0.25) 0%, rgba(34, 211, 238, 0) 34%),
        radial-gradient(circle at 92% 90%, rgba(45, 212, 191, 0.22) 0%, rgba(45, 212, 191, 0) 42%),
        linear-gradient(145deg, #0b1120 0%, #0f172a 45%, #111827 100%);
    }

    .card {
      width: 100%;
      max-width: 450px;
      padding: 28px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid #dbeafe;
      box-shadow: 0 30px 50px rgba(2, 6, 23, 0.35);
    }

    h1 {
      color: #0f172a;
      font-size: 2rem;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    p {
      color: #334155;
      margin-bottom: 18px;
      line-height: 1.4;
    }

    .form-group {
      margin-bottom: 12px;
      display: grid;
      gap: 6px;
    }

    label { color: #334155; font-weight: 600; font-size: 0.92rem; }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: #22d3ee;
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.17);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      color: #022c22;
      background: linear-gradient(90deg, #22d3ee 0%, #14b8a6 100%);
      margin-top: 6px;
    }

    button:disabled { opacity: 0.65; cursor: not-allowed; }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      display: none;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .status.show { display: block; }
    .status.error { background: #fee2e2; border-color: #fecaca; color: #991b1b; }
    .status.success { background: #dcfce7; border-color: #bbf7d0; color: #166534; }

    .meta {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #334155;
    }

    .meta a { color: #0e7490; font-weight: 600; text-decoration: none; }
    .meta a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Welcome Back</h1>
    <p>Sign in to create and manage your short URLs.</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Minimum 8 characters" required>
      </div>
      <button type="submit" id="loginBtn">Log In</button>
    </form>

    <div id="authStatus" class="status"></div>

    <div class="meta">
      New here? <a href="/register">Create an account</a>.
    </div>
  </main>

  <script src="/auth.js" defer></script>
</body>
</html>
