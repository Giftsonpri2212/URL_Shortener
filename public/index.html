<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="icon" href="data:,">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 8px;
      font-size: 2.5rem;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 32px;
      font-size: 1rem;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    input[type="url"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e1e5e9;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .shorten-btn {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .shorten-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .shorten-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .result {
      margin-top: 24px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #667eea;
      display: none;
    }

    .result.show {
      display: block;
    }

    .result-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .short-url {
      word-break: break-all;
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .short-url:hover {
      text-decoration: underline;
    }

    .copy-btn {
      margin-top: 12px;
      background: #28a745;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .copy-btn:hover {
      background: #218838;
    }

    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      font-weight: 500;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 1s ease-in-out infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 URL Shortener</h1>
    <p class="subtitle">Transform long URLs into short, shareable links</p>

    <div class="form-group">
      <label for="urlInput">Enter your long URL:</label>
      <input
        type="url"
        id="urlInput"
        placeholder="https://example.com/very-long-url-here"
      >
    </div>

    <button type="button" class="shorten-btn" id="shortenBtn">
      Shorten URL
    </button>

    <div id="result" class="result">
      <div class="result-label">Your shortened URL:</div>
      <a id="shortUrl" href="#" target="_blank" class="short-url"></a>
      <br>
      <button id="copyBtn" class="copy-btn">Copy to Clipboard</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
